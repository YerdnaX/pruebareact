services:
  - type: web
    name: becas-api
    runtime: docker
    rootDir: backend/BecasAPI
    dockerfilePath: backend/BecasAPI/Dockerfile
    dockerContext: backend/BecasAPI
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false

  - type: web
    name: becas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install ; npm run build
    staticPublishPath: build
    previews:
      generation: manual
    envVars:
      - key: REACT_APP_API_URL
        sync: false